<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>С 8 марта, Соня! 🌸</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Pacifico&display=swap');
:root{--bg:#17212b;--surface:#232e3c;--blue:#5288c1;--blue-l:#64b5ef;--green:#4dcd5c;--text:#fff;--muted:#708fa0;--out:#2b5278;--in:#182533;--pink:#ff6b9d;--pink-l:#ffb3cc;--gold:#ffd700;--purple:#b06ab3}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
#particles{position:fixed;inset:0;pointer-events:none;z-index:0}
#cc{position:fixed;inset:0;pointer-events:none;z-index:999}
#bye{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .8s ease}
#bye.show{opacity:1;pointer-events:all}
.bye-e{font-size:80px;animation:fl 2s ease-in-out infinite}
@keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
.bye-t{font-family:'Pacifico',cursive;font-size:26px;margin-top:18px;text-align:center;line-height:1.5;background:linear-gradient(135deg,var(--pink),var(--gold),var(--blue-l));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.bye-s{font-size:14px;color:var(--muted);margin-top:10px}
.header{position:sticky;top:0;z-index:100;background:var(--surface);display:flex;align-items:center;gap:12px;padding:10px 16px;border-bottom:1px solid rgba(255,255,255,.05);box-shadow:0 2px 16px rgba(0,0,0,.4)}
.av{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,var(--pink),var(--purple));display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;animation:avp 2.5s ease-in-out infinite}
@keyframes avp{0%,100%{box-shadow:0 0 0 2px var(--pink-l)}50%{box-shadow:0 0 0 5px rgba(255,107,157,.25)}}
.hi h1{font-size:16px;font-weight:700}
.hi .on{font-size:12px;color:var(--green);display:flex;align-items:center;gap:4px}
.od{width:6px;height:6px;border-radius:50%;background:var(--green);animation:bk 1.5s infinite}
@keyframes bk{0%,100%{opacity:1}50%{opacity:.2}}
.chat{padding:14px 12px 130px;max-width:500px;margin:0 auto;position:relative;z-index:1}
.divider{text-align:center;margin:12px 0}
.divider span{background:rgba(255,255,255,.07);padding:4px 14px;border-radius:12px;font-size:12px;color:var(--muted)}
.brow{display:flex;align-items:flex-end;gap:6px;margin-bottom:4px}
.brow.out{flex-direction:row-reverse}
.mav{width:28px;height:28px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,var(--pink),var(--purple));display:flex;align-items:center;justify-content:center;font-size:14px}
.bubble{max-width:82%;padding:8px 12px;border-radius:16px;font-size:14px;line-height:1.55;position:relative;word-break:break-word;animation:pop .4s cubic-bezier(.34,1.56,.64,1) both}
@keyframes pop{from{opacity:0;transform:scale(.6) translateY(12px)}to{opacity:1;transform:scale(1) translateY(0)}}
.bubble.in{background:var(--in);border-bottom-left-radius:4px}
.bubble.out{background:var(--out);border-bottom-right-radius:4px;margin-left:auto}
.bt{font-size:11px;color:var(--muted);float:right;margin-left:10px;margin-top:3px}
.bubble.out .bt{color:rgba(255,255,255,.45)}
.tr{display:flex;align-items:flex-end;gap:6px;margin-bottom:4px}
.tb{background:var(--in);padding:10px 14px;border-radius:16px;border-bottom-left-radius:4px;display:inline-flex;gap:4px}
.td{width:6px;height:6px;border-radius:50%;background:var(--muted);animation:td 1.2s infinite}
.td:nth-child(2){animation-delay:.2s}.td:nth-child(3){animation-delay:.4s}
@keyframes td{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-5px);opacity:1}}
.sticker{font-size:72px;text-align:center;padding:6px;animation:wb 1s ease-in-out}
@keyframes wb{0%,100%{transform:rotate(0)}25%{transform:rotate(-8deg)}75%{transform:rotate(8deg)}}
.choices{display:flex;flex-wrap:wrap;gap:8px;padding:4px 0 8px;justify-content:flex-end}
.cb{background:rgba(82,136,193,.15);border:1.5px solid var(--blue);color:var(--blue-l);border-radius:20px;padding:8px 16px;font-size:13px;font-family:'Inter',sans-serif;cursor:pointer;font-weight:500;transition:all .18s;animation:pop .3s cubic-bezier(.34,1.56,.64,1) both}
.cb:nth-child(2){animation-delay:.08s}.cb:nth-child(3){animation-delay:.16s}
.cb:active{transform:scale(.92);background:rgba(82,136,193,.3)}
.gcard{background:var(--surface);border-radius:18px;padding:16px;margin:8px 0;border:1px solid rgba(255,255,255,.07);animation:pop .4s cubic-bezier(.34,1.56,.64,1) both}
.gt{font-size:15px;font-weight:700;margin-bottom:3px}
.gs{font-size:12px;color:var(--muted);margin-bottom:12px}
.fg{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:10px}
.fb{aspect-ratio:1;border-radius:12px;border:none;cursor:pointer;font-size:22px;background:rgba(255,255,255,.05);transition:all .2s;display:flex;align-items:center;justify-content:center}
.fb:active{transform:scale(.88)}
.fb.matched{background:rgba(77,205,92,.18);border:1.5px solid var(--green)}
.fb.revealed{animation:flip .3s ease}
@keyframes flip{0%{transform:rotateY(90deg)}100%{transform:rotateY(0)}}
.gp{text-align:center;font-size:13px;color:var(--muted)}
.pb{height:4px;background:rgba(255,255,255,.08);border-radius:2px;margin-top:8px;overflow:hidden}
.pf{height:100%;background:linear-gradient(90deg,var(--pink),var(--blue-l));border-radius:2px;transition:width .4s ease}
.wcs{display:flex;flex-direction:column;gap:8px}
.wc{background:rgba(255,255,255,.04);border-radius:12px;padding:12px 14px;border:1px solid rgba(255,255,255,.07);cursor:pointer;transition:all .25s;display:flex;align-items:center;gap:10px;position:relative;overflow:hidden}
.wc:active{transform:scale(.97)}
.wc.open{background:rgba(82,136,193,.12);border-color:var(--blue)}
.wi{font-size:24px;flex-shrink:0}
.wt{font-size:13px;line-height:1.4}
.wp{font-size:13px;color:var(--muted)}
.wtap{font-size:11px;color:var(--muted);margin-top:2px}
.sh{position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.05),transparent);transform:translateX(-100%)}
.wc:not(.open) .sh{animation:sh 2s infinite}
@keyframes sh{100%{transform:translateX(100%)}}
.final{font-family:'Pacifico',cursive;font-size:22px;text-align:center;padding:20px 16px;line-height:1.5;background:linear-gradient(135deg,var(--pink),var(--gold),var(--blue-l));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.rbar{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;padding:10px 0 4px}
.rb{background:rgba(255,255,255,.07);border-radius:20px;padding:7px 14px;font-size:18px;cursor:pointer;border:1px solid rgba(255,255,255,.1);transition:all .2s;display:flex;align-items:center;gap:5px;font-family:'Inter',sans-serif}
.rb:active{transform:scale(.88)}
.rb.active{background:rgba(82,136,193,.2);border-color:var(--blue)}
.rc{font-size:12px;color:var(--muted)}
.rb.active .rc{color:var(--blue-l)}
.rl{text-align:center;font-size:12px;color:var(--muted);padding-bottom:4px;animation:pop .4s ease both}
</style>
</head>
<body>
<canvas id="particles"></canvas>
<canvas id="cc"></canvas>
<div id="bye">
  <div class="bye-e">🌸</div>
  <div class="bye-t">С праздником,<br>Сонечка!</div>
  <div class="bye-s">До встречи 💕</div>
</div>
<div class="header">
  <div class="av">🌸</div>
  <div class="hi">
    <h1>oluhZXC</h1>
    <div class="on"><div class="od"></div>в сети</div>
  </div>
</div>
<div class="chat" id="chat">
  <div class="divider"><span>8 марта 🌷</span></div>
</div>
<script>
const chat=document.getElementById('chat');
let rdone=0,wopen=0;
function gt(){const n=new Date();return n.getHours().toString().padStart(2,'0')+':'+n.getMinutes().toString().padStart(2,'0')}
function sl(ms){return new Promise(r=>setTimeout(r,ms))}
function scr(){setTimeout(()=>window.scrollTo({top:document.body.scrollHeight,behavior:'smooth'}),60)}

function showTyping(){
  const r=document.createElement('div');r.className='tr';r.id='tr';
  r.innerHTML='<div class="mav">🌸</div><div class="tb"><div class="td"></div><div class="td"></div><div class="td"></div></div>';
  chat.appendChild(r);scr();
}
function hideTyping(){const t=document.getElementById('tr');if(t)t.remove()}

async function inMsg(html,ms=850){
  showTyping();await sl(ms);hideTyping();
  const r=document.createElement('div');r.className='brow in';
  r.innerHTML=`<div class="mav">🌸</div><div class="bubble in">${html}<span class="bt">${gt()}</span></div>`;
  chat.appendChild(r);scr();
}
function outMsg(html){
  const r=document.createElement('div');r.className='brow out';
  r.innerHTML=`<div class="bubble out">${html}<span class="bt">${gt()} ✓✓</span></div>`;
  chat.appendChild(r);scr();
}
async function inSticker(e,ms=600){
  showTyping();await sl(ms);hideTyping();
  const r=document.createElement('div');r.className='brow in';
  r.innerHTML=`<div class="mav">🌸</div><div class="sticker">${e}</div>`;
  chat.appendChild(r);scr();
}
function choice(opts){
  return new Promise(res=>{
    const w=document.createElement('div');w.className='choices';
    opts.forEach(o=>{
      const b=document.createElement('button');b.className='cb';b.textContent=o.l;
      b.addEventListener('click',()=>{w.remove();outMsg(o.l);res(o.v||o.l);});
      w.appendChild(b);
    });
    chat.appendChild(w);scr();
  });
}

// confetti
const cc=document.getElementById('cc'),cx=cc.getContext('2d');
cc.width=window.innerWidth;cc.height=window.innerHeight;
let pieces=[];
function boom(){
  for(let i=0;i<100;i++)pieces.push({x:Math.random()*cc.width,y:-10,sx:(Math.random()-.5)*5,sy:Math.random()*4+2,sz:Math.random()*9+4,r:Math.random()*360,rs:(Math.random()-.5)*6,c:['#ff6b9d','#ffd700','#64b5ef','#4dcd5c','#b06ab3','#ff9f43'][Math.floor(Math.random()*6)]});
  acf();
}
function acf(){
  cx.clearRect(0,0,cc.width,cc.height);
  pieces=pieces.filter(p=>p.y<cc.height+20);
  pieces.forEach(p=>{cx.save();cx.translate(p.x,p.y);cx.rotate(p.r*Math.PI/180);cx.fillStyle=p.c;cx.fillRect(-p.sz/2,-p.sz/4,p.sz,p.sz/2);cx.restore();p.x+=p.sx;p.y+=p.sy;p.r+=p.rs;});
  if(pieces.length)requestAnimationFrame(acf);else cx.clearRect(0,0,cc.width,cc.height);
}

// petals
const pc=document.getElementById('particles'),px=pc.getContext('2d');
pc.width=window.innerWidth;pc.height=window.innerHeight;
const petals=Array.from({length:12},()=>({x:Math.random()*pc.width,y:Math.random()*pc.height,sz:Math.random()*9+5,sy:Math.random()*.5+.15,sx:(Math.random()-.5)*.3,op:Math.random()*.22+.07,e:['🌸','🌺','🌷','💮'][Math.floor(Math.random()*4)]}));
function ap(){px.clearRect(0,0,pc.width,pc.height);petals.forEach(p=>{px.save();px.globalAlpha=p.op;px.font=p.sz+'px serif';px.fillText(p.e,p.x,p.y);px.restore();p.y+=p.sy;p.x+=p.sx;if(p.y>pc.height+20){p.y=-20;p.x=Math.random()*pc.width;}});requestAnimationFrame(ap);}
ap();

// memory game
function makeGame(){
  const card=document.createElement('div');card.className='gcard';
  const fl=['🌸','🌹','🌺','🌷','💐'],sh=[...fl,...fl].sort(()=>Math.random()-.5);
  let flipped=[],matched=0,canFlip=true;
  card.innerHTML=`<div class="gt">🎮 Найди пары цветов</div><div class="gs">Переворачивай карточки — найди все 5 пар</div><div class="fg" id="fg"></div><div class="gp">Найдено: <span id="fc">0</span> / 5</div><div class="pb"><div class="pf" id="pf" style="width:0%"></div></div>`;
  chat.appendChild(card);scr();
  const g=card.querySelector('#fg');
  sh.forEach(em=>{
    const b=document.createElement('button');b.className='fb';b.dataset.e=em;b.textContent='🎁';
    b.addEventListener('click',()=>{
      if(!canFlip||b.classList.contains('matched')||b.classList.contains('revealed')||flipped.length>=2)return;
      b.textContent=em;b.classList.add('revealed');flipped.push(b);
      if(flipped.length===2){
        canFlip=false;
        if(flipped[0].dataset.e===flipped[1].dataset.e){
          flipped.forEach(x=>x.classList.add('matched'));
          matched++;card.querySelector('#fc').textContent=matched;
          card.querySelector('#pf').style.width=(matched/5*100)+'%';
          flipped=[];canFlip=true;
          if(matched===5)setTimeout(()=>{boom();afterGame();},500);
        }else{
          setTimeout(()=>{flipped.forEach(x=>{x.textContent='🎁';x.classList.remove('revealed');});flipped=[];canFlip=true;},850);
        }
      }
    });
    g.appendChild(b);
  });
}

async function afterGame(){
  await inMsg('🎉 Все пары найдены! Ты просто звезда! ⭐');
  await sl(400);
  await inMsg('Теперь лови свои пожелания — каждое нужно открыть ✨');
  await sl(300);
  showWishes();
}

function showWishes(){
  const ws=[
    {i:'💫',t:'Магия',tx:'Пусть каждое твоё желание исполняется само — как по волшебству! 🌟'},
    {i:'🌺',t:'Красота',tx:'Ты с каждым днём краше, и это не комплимент — это просто факт 💕'},
    {i:'😄',t:'Радость',tx:'Желаю столько улыбок, что щёки устанут. Но это самая приятная усталость!'},
    {i:'🌟',t:'Успех',tx:'Пусть всё задуманное получается легко, а цели сами идут навстречу!'},
    {i:'🫶',t:'Любовь',tx:'Ты окружена теплом и заботой. С праздником, Сонечка! 🌸'},
  ];
  const gc=document.createElement('div');gc.className='gcard';
  gc.innerHTML='<div class="gt">🎀 Твои пожелания</div><div class="gs">Нажми на каждое, чтобы прочитать</div><div class="wcs" id="wl"></div>';
  chat.appendChild(gc);scr();
  const list=gc.querySelector('#wl');
  ws.forEach(w=>{
    const c=document.createElement('div');c.className='wc';
    c.innerHTML=`<div class="sh"></div><div class="wi">${w.i}</div><div><div class="wp">${w.t}</div><div class="wtap">👆 Нажми, чтобы открыть</div></div>`;
    c.addEventListener('click',()=>{
      if(c.classList.contains('open'))return;
      c.classList.add('open');c.innerHTML=`<div class="wi">${w.i}</div><div class="wt">${w.tx}</div>`;
      wopen++;if(wopen===5)setTimeout(()=>{boom();boom();showFinal();},400);
    });
    list.appendChild(c);
  });
}

async function showFinal(){
  await sl(600);
  const f=document.createElement('div');f.className='final';f.innerHTML='С 8 марта,<br>любимая Соня! 🌸';
  chat.appendChild(f);
  await sl(500);
  const l=document.createElement('div');l.className='rl';l.textContent='Поставь все 4 реакции, чтобы завершить 👇';
  chat.appendChild(l);
  const bar=document.createElement('div');bar.className='rbar';
  ['🌹','💕','🥰','✨'].forEach(em=>{
    const b=document.createElement('div');b.className='rb';
    b.innerHTML=`${em} <span class="rc">0</span>`;
    b.addEventListener('click',()=>{
      if(b.classList.contains('active'))return;
      b.classList.add('active');b.querySelector('.rc').textContent='1';
      boom();rdone++;
      if(rdone===4){
        setTimeout(()=>{
          boom();boom();
          setTimeout(()=>{
            document.getElementById('bye').classList.add('show');
            setTimeout(()=>{try{window.close();}catch(e){}},3000);
          },1200);
        },300);
      }
    });
    bar.appendChild(b);
  });
  chat.appendChild(bar);scr();
}

// ── MAIN DIALOGUE ──
async function run(){
  await sl(500);

  // 1. Приветствие
  await inMsg('Соня, привет! 👋');
  await sl(200);
  const g1=await choice([{l:'Привет! 😊',v:'hi'},{l:'Приветик! 🌸',v:'hihi'},{l:'О, кто это? 👀',v:'who'}]);
  if(g1==='who'){await inMsg('Это я — твой праздничный сюрприз! 🎉 Скоро всё узнаешь 😏');}
  else if(g1==='hihi'){await inMsg('Ой, как мило! Приветик-приветик! 🌷 Рада тебя видеть!');}
  else{await inMsg('Привет-привет! 😊 Так рада, что ты здесь!');}

  await sl(300);

  // 2. Про день
  await inMsg('Ты знаешь, какой сегодня день? 🤔');
  await sl(150);
  const g2=await choice([{l:'8 марта! 🌷',v:'yes'},{l:'Обычный день 🙄',v:'no'},{l:'МОЙ день! 👑',v:'mine'}]);
  if(g2==='no'){
    await inMsg('Эй, ну это же твой праздник! 😄');
    await sl(300);
    await inMsg('Сегодня 8 марта и весь мир поздравляет тебя! 🌍🌸');
  }else if(g2==='mine'){
    await inMsg('ИМЕННО!! 👑 Абсолютно твой день!');
    await sl(300);
    await inMsg('Ты сегодня королева, и это официально! 👸✨');
  }else{
    await inMsg('Правильно! 🎉 Сегодня твой праздник!');
    await sl(300);
    await inMsg('И я подготовила кое-что особенное 😏');
  }

  await sl(300);
  await inSticker('💐',700);
  await sl(300);

  // 3. Про настроение
  await inMsg('Как у тебя сейчас настроение? ☀️');
  await sl(150);
  const g3=await choice([{l:'Отличное! 🔥',v:'great'},{l:'Нормальное 😐',v:'ok'},{l:'Только проснулась 😴',v:'sleepy'}]);
  if(g3==='sleepy'){
    await inMsg('Хаха! 😄 Ничего, сейчас проснёшься — я для этого и пришла!');
  }else if(g3==='ok'){
    await inMsg('Сейчас исправим это! 😏 У меня есть кое-что для тебя!');
  }else{
    await inMsg('Огонь! 🔥 Правильный настрой для праздника!');
  }

  await sl(300);

  // 4. Любишь сюрпризы?
  await inMsg('Скажи, ты любишь сюрпризы? 🎁');
  await sl(150);
  const g4=await choice([{l:'Обожаю!! 😍',v:'love'},{l:'Зависит от сюрприза 😏',v:'depends'},{l:'Лучше без сюрпризов 😅',v:'no'}]);
  if(g4==='no'){
    await inMsg('Ха, ну тогда это не сюрприз — это просто поздравление! 😄');
    await sl(300);
    await inMsg('Официально: я тебя поздравляю! Вот. Никаких сюрпризов 😇');
  }else if(g4==='depends'){
    await inMsg('Хороший ответ 😄 Обещаю — этот сюрприз тебе понравится!');
  }else{
    await inMsg('Отлично, потому что я приготовила кое-что интересное! 🥳');
  }

  await sl(300);

  // 5. Цветок
  await inMsg('Кстати, какой твой любимый цветок? 🌸');
  await sl(150);
  const g5=await choice([{l:'Розы 🌹',v:'rose'},{l:'Ромашки 🌼',v:'daisy'},{l:'Тюльпаны 🌷',v:'tulip'},{l:'Все сразу! 💐',v:'all'}]);
  if(g5==='rose'){await inMsg('Классика! 🌹 Розы — это вечно. Ты человек с безупречным вкусом!');}
  else if(g5==='daisy'){await inMsg('Ромашки — это как солнечный день! 🌼 Ты такая же тёплая и светлая!');}
  else if(g5==='tulip'){await inMsg('Тюльпаны — весна и праздник! 🌷 Прямо как ты сегодня!');}
  else{await inMsg('Хаха, правильный ответ! 💐 Зачем выбирать — бери всё и сразу!');}

  await sl(400);

  // 6. Ты знаешь что ты классная?
  await inMsg('Ты знаешь, что ты классная? 🌟');
  await sl(150);
  const g6=await choice([{l:'Ну, слышала 😄',v:'heard'},{l:'Конечно знаю! 😎',v:'know'},{l:'Да ладно… 🙈',v:'shy'}]);
  if(g6==='shy'){
    await inMsg('Нет-нет-нет! Это правда! 💯');
    await sl(300);
    await inMsg('Ты умная, красивая и весёлая — принимай комплименты! 🌸');
  }else if(g6==='know'){
    await inMsg('ВОТ ЭТО правильная уверенность! 😄 Именно такой и надо быть!');
  }else{
    await inMsg('Ну вот, наконец-то! 😄 Запомни это навсегда!');
  }

  await sl(400);

  // 7. Игра
  await inMsg('Окей, у меня для тебя есть игра и 5 пожеланий 🎁');
  await sl(300);
  await inMsg('Сначала — игра! Найди все пары цветов 🌸 и пожелания твои 😊');
  await sl(200);
  const g7=await choice([{l:'Поехали! 🚀',v:'go'},{l:'Я готова! 💪',v:'ready'},{l:'Принять вызов! ⚡',v:'challenge'}]);
  if(g7==='challenge'){await inMsg('Ооо, мне нравится этот настрой! ⚡ Показывай на что способна!');}
  else if(g7==='ready'){await inMsg('Отлично! 💪 Удачи, ты справишься!');}
  else{await inMsg('Лееетим! 🚀 Найди все пары, я верю в тебя!');}

  await sl(300);
  makeGame();
}

run();
window.addEventListener('resize',()=>{pc.width=cc.width=window.innerWidth;pc.height=cc.height=window.innerHeight;});
</script>
